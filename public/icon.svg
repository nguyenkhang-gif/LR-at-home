<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>

  <!-- Aperture blades -->
  <g transform="translate(32,32)">
    <!-- Outer ring -->
    <circle r="22" fill="none" stroke="#4f7fff" stroke-width="2.5" opacity="0.4"/>

    <!-- 6 aperture blades -->
    <g fill="#4f7fff">
      <ellipse rx="7" ry="15" transform="rotate(0)  translate(0,-8)"  opacity="0.85"/>
      <ellipse rx="7" ry="15" transform="rotate(60) translate(0,-8)"  opacity="0.85"/>
      <ellipse rx="7" ry="15" transform="rotate(120) translate(0,-8)" opacity="0.85"/>
      <ellipse rx="7" ry="15" transform="rotate(180) translate(0,-8)" opacity="0.85"/>
      <ellipse rx="7" ry="15" transform="rotate(240) translate(0,-8)" opacity="0.85"/>
      <ellipse rx="7" ry="15" transform="rotate(300) translate(0,-8)" opacity="0.85"/>
    </g>

    <!-- Center hole -->
    <circle r="7" fill="#0a0a0f"/>
    <circle r="4.5" fill="none" stroke="#4f7fff" stroke-width="1.5"/>
  </g>
</svg>
